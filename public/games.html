<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zneish Games</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <a class="brand" id="homeLink" href="/" aria-label="Back to room">
        <span class="brand-mark">Z</span>
        <span>
          <strong>Zneish Games</strong>
          <small>Play Room</small>
        </span>
      </a>

      <nav class="nav-actions" aria-label="Game actions">
        <a class="nav-link" id="backToRoom" href="/">Back to Room</a>
        <a class="nav-link primary" id="assistantLink" href="/assistant.html">AI Assistant</a>
        <a class="nav-link" id="worldGuesserLink" href="/world-guesser.html">World Guesser</a>
        <span class="status-pill"><span class="pulse"></span><span id="gameRoom">Room</span></span>
      </nav>
    </header>

    <main class="games-page">
      <section class="games-hero">
        <p class="eyebrow">Play games</p>
        <h1>Simple games for phone and PC</h1>
        <p>Use keyboard on PC or the buttons on mobile. Choose a game and press Start.</p>
      </section>

      <section class="games-board">
        <div class="game-tabs">
          <button class="active" data-game="snake" type="button">Snake</button>
          <button data-game="tetris" type="button">Tetris</button>
          <button data-game="flappy" type="button">Flappy</button>
          <button data-game="murder" type="button">Murder Guess</button>
        </div>

        <div class="game-stage full">
          <canvas id="gameCanvas" width="360" height="360" aria-label="Game canvas"></canvas>
          <div class="game-info">
            <strong id="gameName">Snake</strong>
            <span id="gameScore">Score: 0</span>
            <p id="gameHelp">Use arrow keys or WASD. Avoid walls and your tail.</p>
            <button id="startGame" type="button">Start Game</button>
            <div class="touch-controls" aria-label="Mobile game controls">
              <button data-control="arrowup" type="button">Up</button>
              <button data-control="arrowleft" type="button">Left</button>
              <button data-control=" " type="button">Flap</button>
              <button data-control="arrowright" type="button">Right</button>
              <button data-control="arrowdown" type="button">Down</button>
            </div>
            <div class="murder-box" id="murderBox" hidden>
              <p id="murderQuestion"></p>
              <div id="murderChoices"></div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="/games.js"></script>
  </body>
</html>
