<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zneish AI Assistant</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="assistant-body">
    <aside class="ai-sidebar">
      <a class="brand ai-brand" id="homeLink" href="/" aria-label="Back to room">
        <span class="brand-mark">Z</span>
        <span>
          <strong>Zneish AI</strong>
          <small id="assistantRoom">Room</small>
        </span>
      </a>

      <button class="new-chat-button" id="newChat" type="button">New chat</button>

      <nav class="ai-nav">
        <a id="backToRoom" href="/">Text Exchange</a>
        <a id="gamesLink" href="/games.html">Games</a>
        <a id="worldGuesserLink" href="/world-guesser.html">World Guesser</a>
      </nav>

      <div class="session-section">
        <span>Recents</span>
        <div class="session-list" id="sessionList"></div>
      </div>
    </aside>

    <main class="ai-main">
      <header class="ai-top">
        <div>
          <p class="eyebrow">Zneish assistant</p>
          <h1 id="chatTitle">What are you working on?</h1>
        </div>
        <div class="export-actions">
          <button id="exportDocx" type="button">Word</button>
          <button id="exportPptx" type="button">PowerPoint</button>
          <span class="status-pill"><span class="pulse"></span><span id="aiStatus">Ready</span></span>
        </div>
      </header>

      <section class="ai-thread" id="chatLog" aria-label="AI chat"></section>

      <form class="ai-composer" id="chatForm">
        <div class="file-list" id="fileList"></div>
        <textarea id="chatInput" rows="3" placeholder="Ask anything..." aria-label="Ask AI"></textarea>
        <div class="composer-actions">
          <label class="file-button">
            <input id="aiFiles" type="file" multiple accept="image/*,.pdf,.txt,.md,.csv,.json,.js,.css,.html" />
            Add files
          </label>
          <span id="fileHint">0 / 10 files</span>
          <button type="button" id="clearFiles">Clear</button>
          <button class="send-button" type="submit">Ask AI</button>
        </div>
      </form>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/assistant.js"></script>
  </body>
</html>
