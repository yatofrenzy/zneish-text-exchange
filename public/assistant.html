<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zneish AI Assistant</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="assistant-body">
    <aside class="ai-sidebar">
      <a class="brand ai-brand" id="homeLink" href="/" aria-label="Back to room">
        <span class="brand-mark">Z</span>
        <span>
          <strong>Zneish AI</strong>
          <small id="assistantRoom">Room</small>
        </span>
      </a>
      <nav class="ai-nav">
        <a id="backToRoom" href="/">Text Exchange</a>
        <a id="gamesLink" href="/games.html">Games</a>
      </nav>
      <div class="ai-tip">
        <strong>Readable uploads</strong>
        <span>Images, PDFs with selectable text, and text files are sent to the assistant.</span>
      </div>
    </aside>

    <main class="ai-main">
      <header class="ai-top">
        <div>
          <p class="eyebrow">AI assistant</p>
          <h1>How can I help?</h1>
        </div>
        <span class="status-pill"><span class="pulse"></span><span id="aiStatus">Ready</span></span>
      </header>

      <section class="ai-thread" id="chatLog" aria-label="AI chat"></section>

      <form class="ai-composer" id="chatForm">
        <div class="file-list" id="fileList"></div>
        <textarea id="chatInput" rows="3" placeholder="Ask anything about your PDFs, photos, or files..." aria-label="Ask AI"></textarea>
        <div class="composer-actions">
          <label class="file-button">
            <input id="aiFiles" type="file" multiple accept="image/*,.pdf,.txt,.md,.csv,.json,.js,.css,.html" />
            Add files
          </label>
          <span id="fileHint">0 / 10 files</span>
          <button type="button" id="clearFiles">Clear</button>
          <button class="send-button" type="submit">Ask AI</button>
        </div>
      </form>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/assistant.js"></script>
  </body>
</html>
